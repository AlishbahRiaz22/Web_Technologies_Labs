<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | The Flourist.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- header section -->
    <header>
        <div class="logo">The Flourist.</div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
  <!-- hero section -->
    <section class="hero">
        <h1>Contact Us</h1>
        <p>We would love to hear from you. Send us a message below.</p>
        <button onclick="window.location.href='index.html#about'">Learn More</button>
    </section>

    <!-- contact section -->
    <section class="contact">
        <h1>Message Us or Visit Us</h1>
        <br>
        <div class="contact-container">

            <div class="contact-info">
                <h3>Visit Our Studio</h3>
                <p>123 Garden Street</p>
                <p>Floral City, PK</p>
                <p>Email: info@theflourist.com</p>
                <p>Phone: +92 300 1234567</p>
            </div>

            <form class="contact-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea rows="5" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>

        </div>
    </section>

    <!-- footer section -->
    <footer>
        <p>© 2026 The Flourist. All rights reserved.</p>
    </footer>

</body>
</html>
